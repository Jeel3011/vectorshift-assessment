version: "3.9"

# ── Development override: mount source for hot-reload ─────────────────────────
# For production, remove the `volumes:` and `command:` overrides.

services:

  backend:
    build:
      context: ./backend
      target: runtime
    ports:
      - "8001:8001"
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - JWT_ALGORITHM=HS256
      - MAX_NODES=500
      - MAX_EDGES=2000
      - PORT=8001
    volumes:
      # Dev only: live-reload via uvicorn --reload
      - ./backend/main.py:/app/main.py:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --log-level info
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: builder          # dev: use Node builder stage directly
      args:
        REACT_APP_API_URL: http://localhost:8001
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true  # needed inside some Docker environments
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    command: npm start
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Production profile (docker compose --profile prod up) ─────────────────────
# Uncomment and set REACT_APP_API_URL to your real backend URL before building.
#
#   frontend-prod:
#     profiles: [prod]
#     build:
#       context: ./frontend
#       target: runtime
#       args:
#         REACT_APP_API_URL: https://api.yourproduct.com
#     ports:
#       - "80:80"
#     depends_on:
#       backend:
#         condition: service_healthy
#     restart: unless-stopped
