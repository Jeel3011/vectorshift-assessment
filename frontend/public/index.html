<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="VectorShift Pipeline Builder — visually compose and validate DAG workflows" />

    <!-- Content Security Policy -->
    <!-- script-src 'self' is tightened further in production by removing 'unsafe-inline';
         react-scripts dev build needs 'unsafe-inline' for HMR. Tighten to 'self' in prod. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' http://localhost:8001 https://fonts.googleapis.com https://fonts.gstatic.com;
        img-src 'self' data:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Preconnect for Google Fonts (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Pipeline Builder</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
